name: advanced-screenshot-agent-ci

on:
  push:
    paths:
      - "advanced_screenshot_agent/**"
      - "tests/**"
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "advanced_screenshot_agent/**"
      - "tests/**"
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: python -m pytest
