name: agentsight-ci

on:
  push:
    paths:
      - "agentsight/**"
      - "advanced_screenshot_agent/**"
      - "tests/**"
      - "docs/**"
      - "examples/**"
      - "skills/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "agentsight/**"
      - "advanced_screenshot_agent/**"
      - "tests/**"
      - "docs/**"
      - "examples/**"
      - "skills/**"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev,capture]"
      - run: ruff check .
      - run: python -m pytest
      - run: python -m build
      - run: python -m agentsight.cli --help
      - run: agentsight --help
